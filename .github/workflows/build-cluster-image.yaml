name: Build and Push Cluster Image

on:
  push:
    branches: [main]
    paths:
      - 'containerfiles/cluster-image/**'
  pull_request:
    paths:
      - 'containerfiles/cluster-image/**'
  workflow_dispatch:
    inputs:
      push:
        description: 'Push image to registry'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/cluster

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push)
        run: podman login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}

      - name: Build cluster image
        run: make build-cluster-image

      - name: Tag and push
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push)
        run: |
          podman tag localhost/cluster:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
